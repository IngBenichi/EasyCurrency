<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCurrency - Conversor de Monedas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }
        .card {
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border-radius: 18px;
        }
        .form-label {
            font-weight: 500;
        }
        .form-control, .btn {
            border-radius: 10px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #4f8cff 0%, #38c6ff 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #38c6ff 0%, #4f8cff 100%);
        }
        .main-title {
            font-size: 2.7rem;
            font-weight: 700;
            color: #2563eb;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px #b6caff;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2563eb;
        }
        #rates {
            background: #fff;
        }
        .list-group-item {
            border-radius: 8px;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center main-title">EasyCurrency</h1>
        <div class="card mb-4">
            <div class="card-body p-4">
                <form id="convertForm">
                    <div class="row mb-3 g-3">
                        <div class="col-md-4">
                            <label for="from_currency" class="form-label">Moneda origen</label>
                            <input type="text" class="form-control" id="from_currency" value="USD" required placeholder="Ej: USD">
                        </div>
                        <div class="col-md-4">
                            <label for="to_currency" class="form-label">Moneda destino (separadas por coma)</label>
                            <input type="text" class="form-control" id="to_currency" value="EUR,MXN" required placeholder="Ej: EUR,MXN">
                        </div>
                        <div class="col-md-4">
                            <label for="amount" class="form-label">Cantidad</label>
                            <input type="number" class="form-control" id="amount" value="1" min="0" step="any" required placeholder="Ej: 100">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Convertir</button>
                </form>
                <div id="result" class="mt-4"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-body p-4">
                <h5 class="card-title">Tasas de cambio actuales</h5>
                <button class="btn btn-secondary mb-3" onclick="fetchRates()">Actualizar tasas</button>
                <div id="rates" style="max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; padding: 8px;"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('convertForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const from = document.getElementById('from_currency').value;
            const to = document.getElementById('to_currency').value;
            const amount = document.getElementById('amount').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="text-center">Procesando...</div>';
            try {
                const res = await fetch(`/convert?from_currency=${from}&to_currency=${to}&amount=${amount}`);
                const data = await res.json();
                if (data.status === 'success') {
                    let html = `<div class='alert alert-success'>${data.message}</div><ul class='list-group mt-3'>`;
                    const nf = new Intl.NumberFormat('es-ES');
                    for (const [currency, value] of Object.entries(data.data.conversions)) {
                        html += `<li class='list-group-item d-flex justify-content-between align-items-center'>${nf.format(data.data.amount)} ${data.data.from} <span class='badge bg-primary'>${nf.format(value)} ${currency}</span></li>`;
                    }
                    html += '</ul>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class='alert alert-danger'>${data.message}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class='alert alert-danger'>Error: ${err}</div>`;
            }
        });
        async function fetchRates() {
            const ratesDiv = document.getElementById('rates');
            ratesDiv.innerHTML = '<div class="text-center">Cargando tasas...</div>';
            try {
                const res = await fetch('/rates');
                const data = await res.json();
                if (data.status === 'success' && data.data && Object.keys(data.data).length > 0) {
                    let html = '<table class="table table-striped"><thead><tr><th>Moneda</th><th>Tasa</th></tr></thead><tbody>';
                    for (const [currency, rate] of Object.entries(data.data)) {
                        html += `<tr><td>${currency}</td><td>${rate !== undefined ? rate : '<span class=\'text-danger\'>No disponible</span>'}</td></tr>`;
                    }
                    html += '</tbody></table>';
                    ratesDiv.innerHTML = html;
                } else if (data.status === 'success') {
                    ratesDiv.innerHTML = `<div class='alert alert-warning'>No hay tasas de cambio disponibles.</div>`;
                } else {
                    ratesDiv.innerHTML = `<div class='alert alert-danger'>${data.message ?? 'Error desconocido.'}</div>`;
                }
            } catch (err) {
                ratesDiv.innerHTML = `<div class='alert alert-danger'>Error: ${err}</div>`;
            }
        }
        window.onload = fetchRates;
    </script>
</body>
</html>
